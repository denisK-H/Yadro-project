bridge_url: "http://127.0.0.1:8080"

devices:
  gen:
    resource: "USB0::0x6656::0x0834::AWG1224500035::INSTR"
    timeout_ms: 3000
    write_termination: "\n"
    read_termination: "\n"

  osc:
    resource: "USB0::0x5345::0x1235::24410241::INSTR"
    timeout_ms: 3000
    write_termination: "\n"
    read_termination: ""

scpi:
  generator_init:
    - ":CHANnel1:BASE:WAVe SINe"
    - ":CHANnel1:BASE:AMPLitude 1"
    - ":CHANnel1:OUTPut ON"

  set_frequency: ":CHANnel1:BASE:FREQuency %.6f"

  measure_vin: ":MEASUrement:CH1:PKPK?"
  measure_vout: ":MEASUrement:CH2:PKPK?"

experiment:
  freq_start_hz: 100
  freq_stop_hz: 1000000
  points: 40
  settle_ms: 500

  read_mode: "raw"
  read_delay_ms: 100
  read_max_bytes: 4096